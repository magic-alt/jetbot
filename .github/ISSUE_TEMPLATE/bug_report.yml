name: Bug report
description: Report a defect in jetbot
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please redact any
        secrets, API keys, or proprietary financial data from logs.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: When I run ... I expected ... but instead ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Python version, install method, relevant `.env` flags.
      placeholder: |
        - OS:
        - Python:
        - Install: pip install -e ".[dev]"
        - LLM_DEFAULT_MODEL:
        - RAG_MODE:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / traceback
      description: Paste the relevant log lines or stack trace.
      render: shell
