version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - TASK_BACKEND=celery
      - CELERY_BROKER_URL=redis://redis:6379/0
      - STORAGE_BACKEND=postgres
      - DATABASE_URL=postgresql://jetbot:jetbot@postgres:5432/jetbot
      - S3_ENDPOINT=http://minio:9000
    volumes:
      - app-data:/app/data
    depends_on:
      - redis
      - postgres
      - minio

  worker:
    build: .
    command: celery -A src.tasks worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - STORAGE_BACKEND=postgres
      - DATABASE_URL=postgresql://jetbot:jetbot@postgres:5432/jetbot
      - S3_ENDPOINT=http://minio:9000
    volumes:
      - app-data:/app/data
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jetbot
      POSTGRES_PASSWORD: jetbot
      POSTGRES_DB: jetbot
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  app-data:
  pg-data:
  minio-data:
