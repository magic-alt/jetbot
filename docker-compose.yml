# Compose Spec — `version:` is intentionally omitted (obsolete in v2 Compose).

services:
  api:
    build:
      context: .
      args:
        EXTRAS: "celery,postgres,s3"
    ports:
      - "18000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      - TASK_BACKEND=celery
      - CELERY_BROKER_URL=redis://redis:6379/0
      - STORAGE_BACKEND=postgres
      - DATABASE_URL=postgresql://jetbot:jetbot@postgres:5432/jetbot
      - S3_ENDPOINT=http://minio:9000
    volumes:
      - app-data:/app/data
    depends_on:
      - redis
      - postgres
      - minio

  worker:
    build:
      context: .
      args:
        EXTRAS: "celery,postgres,s3"
    command: celery -A src.tasks worker --loglevel=info --concurrency=2
    env_file:
      - path: .env
        required: false
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - STORAGE_BACKEND=postgres
      - DATABASE_URL=postgresql://jetbot:jetbot@postgres:5432/jetbot
      - S3_ENDPOINT=http://minio:9000
    volumes:
      - app-data:/app/data
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jetbot
      POSTGRES_PASSWORD: jetbot
      POSTGRES_DB: jetbot
    ports:
      - "15432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio-data:/data

volumes:
  app-data:
  pg-data:
  minio-data:
